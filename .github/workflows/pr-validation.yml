name: PR Validation

on:
  push:
    paths:
      - "Formula/*.rb"
  pull_request:
    paths:
      - "Formula/*.rb"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Get changed formulas
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          formulas=$(git diff --name-only "$base" "${{ github.sha }}" -- 'Formula/*.rb' | xargs -I{} basename {} .rb | tr '\n' ' ')
          echo "formulas=$formulas" >> "$GITHUB_OUTPUT"

      - name: Audit formulas
        run: |
          for formula in ${{ steps.changed.outputs.formulas }}; do
            brew audit --strict "lmnotran/tap/$formula"
          done

      - name: Install and test formulas
        run: |
          for formula in ${{ steps.changed.outputs.formulas }}; do
            brew install --force "lmnotran/tap/$formula"
            brew test "lmnotran/tap/$formula"
            brew unlink "lmnotran/tap/$formula"
          done

      - name: Verify aliases
        run: |
          for alias in Aliases/*; do
            [ -L "$alias" ] || continue
            name=$(basename "$alias")
            target=$(basename "$(readlink "$alias")" .rb)
            installed=$(brew info "lmnotran/tap/$name" --json=v1 | jq -r '.[0].full_name')
            expected="lmnotran/tap/$target"
            if [ "$installed" != "$expected" ]; then
              echo "::error::Alias $name should resolve to $expected but got $installed"
              exit 1
            fi
            echo "✓ $name -> $expected"
          done
